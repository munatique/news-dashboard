<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개인사업자 뉴스 모음</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --bg-deep: #ffffff;
  --bg-surface: #f7f8fa;
  --bg-card: #ffffff;
  --bg-hover: #f0f2f5;
  --accent-blue: #2563eb;
  --accent-teal: #0d9488;
  --accent-amber: #d97706;
  --accent-coral: #dc2626;
  --accent-purple: #7c3aed;
  --text-primary: #1a1a1a;
  --text-secondary: #555555;
  --text-muted: #999999;
  --border: #e5e7eb;
  --border-active: rgba(37,99,235,0.3);
  --sidebar-w: 240px;
  --header-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
}

/* --- HEADER --- */
.header {
  position: fixed; top:0; left:0; right:0;
  height: var(--header-h);
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 32px;
  z-index: 100;
}
.logo {
  font-family: 'Pretendard', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--accent-blue);
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 10px;
}
.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent-teal);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}
.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 16px;
}
.update-status {
  font-size: 14px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.update-status .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-teal);
}
.btn-refresh {
  background: none; border: 1px solid var(--border);
  color: var(--text-secondary); padding: 6px 14px;
  border-radius: 6px; font-size: 14px; cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-refresh:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

/* --- LAYOUT --- */
.layout {
  display: flex;
  height: calc(100vh - var(--header-h));
  margin-top: var(--header-h);
}

/* --- SIDEBAR --- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 0;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

.sidebar-section {
  margin-bottom: 8px;
}
.sidebar-section-title {
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 12px 20px 6px;
}
.kw-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  font-size: 15px; color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  position: relative;
}
.kw-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.kw-item.active {
  background: rgba(37,99,235,0.06);
  color: var(--accent-blue);
  border-left-color: var(--accent-blue);
  font-weight: 500;
}
.kw-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.kw-count {
  margin-left: auto;
  font-size: 13px;
  color: var(--text-muted);
  background: rgba(0,0,0,0.04);
  padding: 1px 7px;
  border-radius: 10px;
  min-width: 22px; text-align: center;
}

/* --- MAIN --- */
.main {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.toolbar {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 12px;
  background: var(--bg-surface);
}
.toolbar-row {
  display: flex; align-items: center; gap: 12px;
}
.toolbar-filters {
  display: flex; align-items: flex-start; gap: 16px;
}
.filter-divider {
  width: 1px;
  align-self: stretch;
  background: var(--border);
  margin: 0 4px;
}
.filter-group {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.filter-group-kw {
  align-items: flex-start;
  flex: 1;
  min-width: 0;
}
.filter-label {
  font-size: 13px; font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 42px;
  padding-top: 2px;
}
.kw-chips {
  display: flex; flex-direction: column; gap: 5px;
}
.kw-chip-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  align-items: center;
}
.kw-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all 0.15s;
  user-select: none;
  font-family: inherit;
}
.kw-chip:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.kw-chip.active {
  background: var(--accent-blue);
  color: #fff;
  border-color: var(--accent-blue);
}
.kw-chip .chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.kw-chip.active .chip-dot { background: rgba(255,255,255,0.5) !important; }
.period-btns {
  display: flex; gap: 4px;
}
.period-btn {
  font-size: 13px; padding: 4px 14px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.period-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.period-btn.active {
  background: var(--accent-blue);
  color: #fff;
  border-color: var(--accent-blue);
}
.custom-range {
  display: flex; align-items: center; gap: 6px;
  margin-left: 8px;
}
.date-input {
  font-size: 13px; padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: inherit;
}
.search-wrap {
  position: relative; flex: 1; max-width: 480px;
}
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 17px;
  pointer-events: none;
}
.search-input {
  width: 100%; height: 42px;
  padding: 0 14px 0 38px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px; color: var(--text-primary);
  font-family: inherit;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { outline: none; border-color: var(--accent-blue); }
.result-info {
  margin-left: auto;
  font-size: 15px; color: var(--text-secondary);
  white-space: nowrap;
}
.result-info strong { color: var(--accent-blue); font-weight: 600; }

/* --- NEWS LIST --- */
.news-scroll {
  flex: 1; overflow-y: auto;
  padding: 0;
}
.news-scroll::-webkit-scrollbar { width: 4px; }
.news-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

.news-header {
  display: grid;
  grid-template-columns: 130px 55px 130px 1fr;
  gap: 12px;
  padding: 11px 28px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 2px solid var(--border);
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 1;
}
.news-item {
  display: grid;
  grid-template-columns: 130px 55px 130px 1fr;
  gap: 12px;
  align-items: center;
  padding: 11px 28px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  color: inherit;
}
.news-item:hover { background: var(--bg-hover); }
.news-date {
  font-size: 14px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.news-tag {
  font-size: 13px;
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 500;
  white-space: nowrap;
  display: inline-block;
}
.news-title {
  font-size: 15px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.news-item:hover .news-title { color: var(--accent-blue); }
.new-badge {
  font-size: 11px;
  font-weight: 700;
  color: #ff1744;
  background: rgba(255,23,68,0.12);
  padding: 1px 6px;
  border-radius: 3px;
  letter-spacing: -0.5px;
  white-space: nowrap;
  animation: newGlow 1.5s ease-in-out infinite alternate;
}
@keyframes newGlow {
  0% { text-shadow: 0 0 2px rgba(255,23,68,0.3); }
  100% { text-shadow: 0 0 8px rgba(255,23,68,0.6); }
}

/* --- LOADING / EMPTY --- */
.state-msg {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 300px;
  color: var(--text-muted); font-size: 15px;
  gap: 12px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid #e5e7eb;
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- TAG COLORS --- */
.tag-individual { background: #ede9fe; color: #6d28d9; }
.tag-small-biz { background: #d1fae5; color: #047857; }
.tag-seoul { background: #dbeafe; color: #1d4ed8; }
.tag-metro { background: #fef3c7; color: #b45309; }
.tag-province { background: #fee2e2; color: #b91c1c; }

/* responsive */
/* --- MOBILE CARD --- */
.news-card {
  display: block;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
}
.news-card-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.news-card-date {
  font-size: 12px;
  color: var(--text-muted);
}
.news-card-title {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

@media (max-width: 768px) {
  :root {
    --header-h: 48px;
  }
  .sidebar { display: none; }
  .header { padding: 0 12px; }
  .logo { font-size: 18px; }
  .update-status { font-size: 12px; }
  .btn-refresh { font-size: 12px; padding: 4px 10px; }
  .toolbar { padding: 10px 12px; gap: 8px; }
  .toolbar-filters {
    flex-direction: column;
    gap: 8px;
  }
  .filter-divider {
    width: 100%;
    height: 1px;
    margin: 0;
  }
  .filter-group { flex-wrap: wrap; }
  .filter-label { font-size: 12px; min-width: 32px; }
  .period-btns { flex-wrap: wrap; }
  .period-btn { font-size: 12px; padding: 4px 10px; }
  .filter-group-kw {
    overflow: hidden;
  }
  .kw-chips {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    gap: 4px;
    padding-bottom: 4px;
  }
  .kw-chips::-webkit-scrollbar { display: none; }
  .kw-chip-row {
    display: contents;
  }
  .kw-chip-row > span[style] { display: none; }
  .kw-chip { font-size: 11px; padding: 3px 8px; flex-shrink: 0; white-space: nowrap; }
  .kw-chip .chip-dot { width: 5px; height: 5px; }
  .custom-range { margin-left: 0; }
  .date-input { font-size: 12px; padding: 3px 6px; }
  .search-wrap { max-width: 100%; }
  .search-input { height: 36px; font-size: 14px; }
  .result-info { font-size: 13px; }
  .news-header {
    grid-template-columns: 1fr;
    display: none;
  }
  .news-item {
    grid-template-columns: 1fr;
    padding: 10px 12px;
    gap: 4px;
  }
  .news-item .news-date { font-size: 12px; }
  .news-item .news-title {
    font-size: 14px;
    white-space: normal;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .news-header { padding: 8px 12px; }
  .state-msg { font-size: 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-dot"></span>
    개인사업자 뉴스 모음
  </div>
  <div class="header-right">
    <div class="update-status">
      <span class="dot"></span>
      <span id="updateTime">불러오는 중...</span>
    </div>
    <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="toolbar">
      <div class="toolbar-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" type="text" placeholder="뉴스 제목으로 검색..." id="searchInput">
        </div>
        <div class="result-info" id="resultInfo"></div>
      </div>
      <div class="toolbar-filters">
        <div class="filter-group">
          <span class="filter-label">기간</span>
          <div class="period-btns" id="periodBtns">
            <button class="period-btn" data-period="today">오늘업뎃만</button>
            <button class="period-btn" data-period="all">전체</button>
            <button class="period-btn" data-period="3m">최근 3개월</button>
            <button class="period-btn" data-period="6m">최근 6개월</button>
            <button class="period-btn" data-period="custom">직접설정</button>
          </div>
          <div class="custom-range" id="customRange" style="display:none;">
            <input type="date" id="dateFrom" class="date-input">
            <span style="color:var(--text-muted);">~</span>
            <input type="date" id="dateTo" class="date-input">
          </div>
        </div>
        <div class="filter-divider"></div>
        <div class="filter-group filter-group-kw">
          <span class="filter-label">키워드</span>
          <div class="kw-chips" id="kwChips"></div>
        </div>
      </div>
    </div>
    <div class="news-scroll" id="newsList">
      <div class="state-msg"><div class="spinner"></div>데이터를 불러오는 중...</div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1HfOD95A1duNXH6TxB3oNnD2dTbWUJrTFcTuSE0-Z7Ks';
const AUTO_REFRESH_MS = 10 * 60 * 1000; // 10분마다

const KW_META = {
  '개인사업자':       { group: '핵심 키워드', color: '#9b8aff', tagClass: 'tag-individual' },
  '소상공인':         { group: '핵심 키워드', color: '#2dd4a8', tagClass: 'tag-small-biz' },
  '서울신용보증재단': { group: '수도권',     color: '#4a9eff', tagClass: 'tag-seoul' },
  '경기신용보증재단': { group: '수도권',     color: '#4a9eff', tagClass: 'tag-seoul' },
  '인천신용보증재단': { group: '수도권',     color: '#4a9eff', tagClass: 'tag-seoul' },
  '강원신용보증재단': { group: '충청·강원',  color: '#f0a050', tagClass: 'tag-metro' },
  '충남신용보증재단': { group: '충청·강원',  color: '#f0a050', tagClass: 'tag-metro' },
  '충북신용보증재단': { group: '충청·강원',  color: '#f0a050', tagClass: 'tag-metro' },
  '대전신용보증재단': { group: '충청·강원',  color: '#f0a050', tagClass: 'tag-metro' },
  '세종신용보증재단': { group: '충청·강원',  color: '#f0a050', tagClass: 'tag-metro' },
  '전북신용보증재단': { group: '호남',       color: '#f07068', tagClass: 'tag-province' },
  '전남신용보증재단': { group: '호남',       color: '#f07068', tagClass: 'tag-province' },
  '광주신용보증재단': { group: '호남',       color: '#f07068', tagClass: 'tag-province' },
  '경북신용보증재단': { group: '영남',       color: '#f0a050', tagClass: 'tag-metro' },
  '경남신용보증재단': { group: '영남',       color: '#f0a050', tagClass: 'tag-metro' },
  '대구신용보증재단': { group: '영남',       color: '#f0a050', tagClass: 'tag-metro' },
  '부산신용보증재단': { group: '영남',       color: '#f0a050', tagClass: 'tag-metro' },
  '울산신용보증재단': { group: '영남',       color: '#f0a050', tagClass: 'tag-metro' },
  '제주신용보증재단': { group: '제주',       color: '#f07068', tagClass: 'tag-province' },
};

// Keyword sort order based on sidebar menu order
const KW_SORT_ORDER = {};
Object.keys(KW_META).forEach((kw, i) => { KW_SORT_ORDER[kw] = i; });

let allNews = [];
let activeKws = new Set(); // empty = 전체
let activePeriod = 'today';
let _searchTimer = null;

// Pre-compute cutoff once per filter change, not per row
let _cachedCutoff = null;
function updateCutoff() {
  const now = new Date();
  if (activePeriod === 'all') { _cachedCutoff = null; return; }
  if (activePeriod === 'today') {
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    _cachedCutoff = { type:'after', ts: start.getTime() };
    return;
  }
  if (activePeriod === '3m') { now.setMonth(now.getMonth() - 3); _cachedCutoff = { type:'after', ts: now.getTime() }; return; }
  if (activePeriod === '6m') { now.setMonth(now.getMonth() - 6); _cachedCutoff = { type:'after', ts: now.getTime() }; return; }
  if (activePeriod === 'custom') {
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    _cachedCutoff = {
      type: 'range',
      from: from ? new Date(from).getTime() : null,
      to: to ? new Date(to + 'T23:59:59').getTime() : null
    };
    return;
  }
  _cachedCutoff = null;
}

function isInPeriod(ts) {
  if (!ts || !_cachedCutoff) return true;
  if (_cachedCutoff.type === 'after') return ts >= _cachedCutoff.ts;
  if (_cachedCutoff.from && ts < _cachedCutoff.from) return false;
  if (_cachedCutoff.to && ts > _cachedCutoff.to) return false;
  return true;
}

function shortKw(kw) {
  return kw.replace('신용보증재단', '신보');
}

function formatDate(dateStr) {
  if (!dateStr) return { day: '', time: '' };
  const parts = dateStr.split(' ');
  const d = parts[0] || '';
  const t = parts[1] || '';
  const dp = d.split('-');
  const day = dp.length >= 3 ? `${dp[0].slice(2)}.${dp[1].padStart(2,'0')}.${dp[2].padStart(2,'0')}` : d;
  return { day, time: t };
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const counts = {};
  allNews.forEach(n => {
    counts[n.keyword] = (counts[n.keyword] || 0) + 1;
  });

  let html = '';
  // "전체" item — active when no keywords selected
  html += `<div class="kw-item ${activeKws.size === 0 ? 'active' : ''}" data-kw="전체">
    <span class="kw-dot" style="background:var(--accent-blue)"></span>
    <span>전체</span>
    <span class="kw-count">${allNews.length}</span>
  </div>`;

  const groups = {};
  const kwOrder = [];
  Object.keys(KW_META).forEach(kw => {
    const g = KW_META[kw].group;
    if (!groups[g]) { groups[g] = []; kwOrder.push(g); }
    groups[g].push(kw);
  });

  kwOrder.forEach(g => {
    html += `<div class="sidebar-section"><div class="sidebar-section-title">${g}</div>`;
    groups[g].forEach(kw => {
      const c = counts[kw] || 0;
      const meta = KW_META[kw];
      const label = kw.includes('신용보증재단') ? kw.replace('신용보증재단', '') : kw;
      html += `<div class="kw-item ${activeKws.has(kw) ? 'active' : ''}" data-kw="${kw}">
        <span class="kw-dot" style="background:${meta.color}"></span>
        <span>${label}</span>
        <span class="kw-count">${c}</span>
      </div>`;
    });
    html += `</div>`;
  });

  sidebar.innerHTML = html;
  sidebar.querySelectorAll('.kw-item').forEach(el => {
    el.addEventListener('click', () => {
      const kw = el.dataset.kw;
      if (kw === '전체') {
        activeKws.clear();
      } else {
        if (activeKws.has(kw)) activeKws.delete(kw);
        else activeKws.add(kw);
      }
      render();
    });
  });
}

function buildKwChips() {
  const container = document.getElementById('kwChips');
  const row1Groups = ['핵심 키워드', '수도권', '충청·강원'];
  const row2Groups = ['호남', '영남', '제주'];

  function renderRow(groupNames) {
    let html = '<div class="kw-chip-row">';
    groupNames.forEach((g, gi) => {
      if (gi > 0) html += '<span style="width:1px;height:16px;background:var(--border);margin:0 4px;"></span>';
      Object.keys(KW_META).forEach(kw => {
        if (KW_META[kw].group !== g) return;
        const meta = KW_META[kw];
        const label = kw.includes('신용보증재단') ? kw.replace('신용보증재단', '') : kw;
        html += `<button class="kw-chip ${activeKws.has(kw) ? 'active' : ''}" data-kw="${kw}">
          <span class="chip-dot" style="background:${meta.color}"></span>${label}
        </button>`;
      });
    });
    html += '</div>';
    return html;
  }

  container.innerHTML = renderRow(row1Groups) + renderRow(row2Groups);
  container.querySelectorAll('.kw-chip').forEach(el => {
    el.addEventListener('click', () => {
      const kw = el.dataset.kw;
      if (activeKws.has(kw)) activeKws.delete(kw);
      else activeKws.add(kw);
      render();
    });
  });
}

function buildPeriodBtns() {
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.period === activePeriod);
  });
  document.getElementById('customRange').style.display = activePeriod === 'custom' ? 'flex' : 'none';
}

function getFiltered() {
  updateCutoff();
  const hasKw = activeKws.size > 0;
  const isToday = activePeriod === 'today';
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const result = [];
  for (let i = 0, len = allNews.length; i < len; i++) {
    const n = allNews[i];
    if (hasKw && !activeKws.has(n.keyword)) continue;
    if (isToday) { if (!n._isToday) continue; }
    else if (!isInPeriod(n._ts)) continue;
    if (q && n._searchText.indexOf(q) === -1) continue;
    result.push(n);
  }
  return result;
}

const MAX_RENDER = 500;
const isMobile = () => window.innerWidth <= 768;

function renderNews() {
  const list = getFiltered();
  const container = document.getElementById('newsList');
  const info = document.getElementById('resultInfo');
  info.innerHTML = `<strong>${list.length}</strong>건`;

  if (!list.length) {
    container.innerHTML = `<div class="state-msg">검색 결과가 없습니다</div>`;
    return;
  }

  const showList = list.length > MAX_RENDER ? list.slice(0, MAX_RENDER) : list;
  const mobile = isMobile();
  const parts = [];

  if (!mobile) {
    parts.push(`<div class="news-header"><div>발행일</div><div></div><div>키워드</div><div>뉴스 제목</div></div>`);
  }

  for (let i = 0, len = showList.length; i < len; i++) {
    const n = showList[i];
    const newBadge = n._isToday ? '<span class="new-badge">오늘업뎃</span>' : '';
    if (mobile) {
      parts.push(`<a class="news-card" href="${n.link}" target="_blank" rel="noopener">
        <div class="news-card-top"><span class="news-card-date">${n._dayTime}</span>${newBadge}<span class="news-tag ${n._tagClass}">${n._shortKw}</span></div>
        <div class="news-card-title">${n._titleHtml}</div>
      </a>`);
    } else {
      parts.push(`<a class="news-item" href="${n.link}" target="_blank" rel="noopener"><div class="news-date">${n._dayTime}</div><div>${newBadge}</div><div><span class="news-tag ${n._tagClass}">${n._shortKw}</span></div><div class="news-title">${n._titleHtml}</div></a>`);
    }
  }
  if (list.length > MAX_RENDER) {
    parts.push(`<div style="padding:12px 28px;text-align:center;color:var(--text-muted);font-size:13px;">외 ${list.length - MAX_RENDER}건 — 검색 또는 필터로 범위를 좁혀주세요</div>`);
  }
  container.innerHTML = parts.join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  buildSidebar();
  buildKwChips();
  buildPeriodBtns();
  renderNews();
}

function onSearchInput() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(renderNews, 120);
}

// JSONP callback — Google Sheets will call this function
function handleSheetData(data) {
  try {
    const rows = data.table.rows;
    const news = [];
    const tmpDiv = document.createElement('div');
    for (let i = 0; i < rows.length; i++) {
      const c = rows[i].c;
      if (!c) continue;
      const keyword = (c[1] && c[1].v) ? String(c[1].v).replace(/^"|"$/g, '') : '';
      const title = (c[3] && c[3].v) ? String(c[3].v) : '';
      const link = (c[4] && c[4].v) ? String(c[4].v) : '';
      let published = (c[5] && c[5].f) ? String(c[5].f) : (c[5] && c[5].v) ? String(c[5].v) : '';
      const summary = (c[6] && c[6].v) ? String(c[6].v) : '';
      if (!title || !keyword) continue;
      const dateMatch = published.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+)/);
      if (dateMatch) {
        const [, y, m, d, h, min] = dateMatch;
        published = `${y}-${String(Number(m)+1).padStart(2,'0')}-${String(d).padStart(2,'0')} ${h}:${String(min).padStart(2,'0')}`;
      }
      // Pre-compute: timestamp, formatted date, search text, tag class, escaped title
      // Normalize time: "2026-05-10 5:01" → "2026-05-10T05:01"
      let normalizedPublished = published;
      const timeMatch = published.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{1,2}):(\d{2})$/);
      if (timeMatch) {
        normalizedPublished = `${timeMatch[1]}T${timeMatch[2].padStart(2,'0')}:${timeMatch[3]}`;
      } else {
        normalizedPublished = published.replace(' ', 'T');
      }
      const pd = normalizedPublished ? new Date(normalizedPublished) : null;
      const ts = pd && !isNaN(pd) ? pd.getTime() : null;
      const { day, time } = formatDate(published);
      const meta = KW_META[keyword] || { tagClass: 'tag-individual', color: '#888' };
      tmpDiv.textContent = title;
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const isToday = published.startsWith(todayStr);
      news.push({
        keyword, title, link, published, summary,
        _ts: ts,
        _dayTime: `${day} ${time}`,
        _searchText: (title + ' ' + keyword).toLowerCase(),
        _tagClass: meta.tagClass,
        _shortKw: shortKw(keyword),
        _titleHtml: tmpDiv.innerHTML,
        _isToday: isToday
      });
    }
    news.sort((a, b) => {
      // 1순위: 날짜(시간 제외) 최신순
      const da = (a.published || '').split(' ')[0] || '';
      const db = (b.published || '').split(' ')[0] || '';
      if (da !== db) return db.localeCompare(da);
      // 2순위: 키워드 사이드바 순서
      const ka = KW_SORT_ORDER[a.keyword] ?? 999;
      const kb = KW_SORT_ORDER[b.keyword] ?? 999;
      if (ka !== kb) return ka - kb;
      // 3순위: 시간 최신순
      return (b._ts || 0) - (a._ts || 0);
    });
    allNews = news;
    render();
    const now = new Date();
    document.getElementById('updateTime').textContent =
      `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 업데이트`;
  } catch (e) {
    document.getElementById('newsList').innerHTML = `<div class="state-msg">
      데이터 파싱 오류<br>
      <span style="font-size:11px;color:var(--text-muted)">${escHtml(e.message)}</span>
    </div>`;
    console.error(e);
  }
}

function loadData() {
  const container = document.getElementById('newsList');
  container.innerHTML = `<div class="state-msg"><div class="spinner"></div>데이터를 불러오는 중...</div>`;
  // Remove previous script tag if any
  const old = document.getElementById('gviz-script');
  if (old) old.remove();
  // JSONP: inject script tag — bypasses CORS entirely
  const script = document.createElement('script');
  script.id = 'gviz-script';
  script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleSheetData&gid=0`;
  script.onerror = function() {
    container.innerHTML = `<div class="state-msg">
      데이터를 불러올 수 없습니다<br>
      <span style="font-size:12px;color:var(--text-muted)">스프레드시트 공유 설정을 확인해주세요</span>
    </div>`;
  };
  document.body.appendChild(script);
}

document.getElementById('searchInput').addEventListener('input', onSearchInput);

// Period button clicks
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activePeriod = btn.dataset.period;
    render();
  });
});

// Custom date range changes
document.getElementById('dateFrom').addEventListener('change', renderNews);
document.getElementById('dateTo').addEventListener('change', renderNews);

// Re-render on resize for mobile/desktop switch
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(renderNews, 200);
});

// initial load
loadData();

// auto-refresh every 10 min
setInterval(loadData, AUTO_REFRESH_MS);
</script>
</body>
